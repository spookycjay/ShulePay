{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-12">
            <h2 class="mb-4">School Class Management</h2>
            
            <!-- Form to Add a New Class -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Add New Class</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="input-group">
                            <input type="text" name="class_name" class="form-control" placeholder="e.g., Grade 1, Form 4 Blue, Kindergarten" required>
                            <button type="submit" class="btn btn-success">Save Class</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Table of Existing Classes -->
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Existing Classes</h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 100px;">ID</th>
                                <th>Class Name</th>
                                <th class="text-center">Total Students</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for c in classes %}
                            <tr>
                                <td>{{ c.id }}</td>
                                <td><strong>{{ c.name }}</strong></td>
                                <td class="text-center">
                                    <span class="badge bg-info">{{ c.students|length }}</span>
                                </td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="3" class="text-center py-4 text-muted">No classes added yet. Use the form above to start.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
